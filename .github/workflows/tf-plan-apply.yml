name: 'Terraform Plan/Apply'

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

# Concurrency lock prevents parallel runs from clobbering Terraform state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false    

#Special permissions required for OIDC authentication
permissions:
  id-token: write
  contents: read
  pull-requests: write


#These environment variables are used by the terraform azure provider to setup OIDD authenticate. 
env:
  ARM_CLIENT_ID: "${{ vars.AZURE_CLIENT_ID }}"
  ARM_SUBSCRIPTION_ID: "${{ vars.AZURE_SUBSCRIPTION_ID }}"
  ARM_TENANT_ID: "${{ vars.AZURE_TENANT_ID }}"
  TF_VAR_allowed_source_ip: ${{ vars.TF_VAR_ALLOWED_SOURCE_IP }}
  TF_VAR_tf_principal_object_id: ${{ vars.TF_PRINCIPAL_OBJECT_ID }}
  TF_VAR_plan_principal_object_id: ${{ vars.PLAN_PRINCIPAL_OBJECT_ID }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}


jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}
    defaults:
        run:
          working-directory: terraform
    
    steps:
    # Checkout the repository to the GitHub Actions runner 
    - name: Checkout
      uses: actions/checkout@v7

    # Login to Azure usin OIDC
    - name: Azure login with OIDC
      uses: azure/login@v3
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    # Install the latest version of the Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false   
    
    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform init

    # Checks that all Terraform configuration files adhere to a canonical format
    # Will fail the build if not
    - name: Terraform Format
      run: terraform fmt -check

    # Generates an execution plan for Terraform
    # An exit code of 0 indicated no changes, 1 a terraform failure, 2 there are pending changes.
    - name: Terraform Plan
      id: tf-plan
      run: |
        export exitcode=0
        terraform plan -detailed-exitcode -no-color -out tfplan || export exitcode=$?

        echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

        if [ $exitcode -eq 1 ]; then
          echo Terraform Plan Failed!
          exit 1
        else
          exit 0
        fi

    # Save plan to artifacts  
    - name: Publish Terraform Plan
      uses: actions/upload-artifact@v7
      with:
        name: tfplan
        path: terraform/tfplan
    
    # Create string output of Terraform Plan
    - name: Create String Output
      id: tf-plan-string
      run: |
        TERRAFORM_PLAN=$(terraform show -no-color tfplan)
        
        delimiter="$(openssl rand -hex 8)"
        echo "summary<<${delimiter}" >> $GITHUB_OUTPUT
        echo "## Terraform Plan Output" >> $GITHUB_OUTPUT
        echo "<details><summary>Click to expand</summary>" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo '```terraform' >> $GITHUB_OUTPUT
        echo "$TERRAFORM_PLAN" >> $GITHUB_OUTPUT
        echo '```' >> $GITHUB_OUTPUT
        echo "</details>" >> $GITHUB_OUTPUT
        echo "${delimiter}" >> $GITHUB_OUTPUT

    # Publish Terraform Plan as Task Summary
    - name: Publish Terraform Plan to Task Summary
      env:
        SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
      run: |
        echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

    # If this is a PR post the changes 
    - name: Push Terraform Output to PR
      if: github.ref != 'refs/heads/main'
      uses: actions/github-script@v9
      env:
        SUMMARY: "${{ steps.tf-plan-string.outputs.summary }}"
      with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `${process.env.SUMMARY}`;
            github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
            })
  
  terraform-apply:
    name: 'Terraform Apply'
    if: github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.tfplanExitCode == 2
    runs-on: ubuntu-latest
    environment: dev
    needs: [terraform-plan]
    # Apply runs as the full-access SP (federated subject: environment:dev),
    # overriding the read-only SP used by the plan job / global env.
    env:
      ARM_CLIENT_ID: "${{ vars.AZURE_CLIENT_ID_APPLY }}"
    defaults:
        run:
          working-directory: terraform

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v7  

    # Login to Azure usin OIDC
    - name: Azure login with OIDC
      uses: azure/login@v3
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID_APPLY }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
    
    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform init

    # Download saved plan from artifacts
    - name: Download Terraform Plan 
      uses: actions/download-artifact@v8
      with:
        name: tfplan
        path: terraform/

    # Terraform Apply
    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan

    # Surface VM first-boot (cloud-init) progress via the serial console captured
    # by Azure boot diagnostics. No inbound ports: the log is pulled through the
    # Azure control plane. Reads use the full SP's Contributor rights.
    - name: Stream cloud-init progress (serial console)
      run: |
        echo "Tailing VM cloud-init via boot diagnostics (no SSH / inbound ports)…"
        deadline=$(( $(date +%s) + 1200 ))   # up to 20 minutes (image pulls on a burstable B2s can be slow)
        printed=0
        while [ "$(date +%s)" -lt "$deadline" ]; do
          # The serial log comes back as one blob with escaped/CRLF newlines; normalise
          # to real lines, strip cloud-init's "[ts] cloud-init[pid]:" prefix, keep only
          # our WINDMILL markers, and de-dup.
          markers=$(az vm boot-diagnostics get-boot-log -g rg-windmill -n vm-windmill 2>/dev/null \
            | sed 's/\\r\\n/\n/g' | tr -d '\r' \
            | grep -F 'WINDMILL' | sed -E 's/^.*cloud-init\[[0-9]+\]: //' | awk '!seen[$0]++')
          count=$(printf '%s\n' "$markers" | grep -c . || true)
          if [ "$count" -gt "$printed" ]; then
            printf '%s\n' "$markers" | tail -n +"$((printed + 1))" | sed 's/^/  /'
            printed="$count"
          fi
          if printf '%s\n' "$markers" | grep -q 'WINDMILL_CLOUDINIT_DONE'; then
            echo "✅ cloud-init complete — Windmill stack started."
            exit 0
          fi
          sleep 20
        done
        echo "::warning::cloud-init not confirmed within 20m. Check the Serial Console / Boot diagnostics blade in the Azure portal."